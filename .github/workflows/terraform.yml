name: Terraform Infrastructure Provisioning

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_bucket_name: ${{ vars.S3_BUCKET_NAME || 'shopsmart-devops' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}
    
    defaults:
      run:
        working-directory: ./terraform
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Terraform Format Check
      id: fmt
      run: |
        terraform fmt -check -recursive 2>&1 | tee terraform-fmt-output.log
      continue-on-error: true
    
    - name: Terraform Init
      id: init
      run: |
        terraform init 2>&1 | tee terraform-init-output.log
    
    - name: Terraform Validate
      id: validate
      run: |
        terraform validate -no-color 2>&1 | tee terraform-validate-output.log
    
    - name: Terraform Plan
      id: plan
      run: |
        echo "📋 Creating Terraform plan..."
        terraform plan -no-color -out=tfplan 2>&1 | tee terraform-plan-output.log
        if [ $? -eq 0 ]; then
          echo "✅ Terraform plan succeeded!"
        else
          echo "❌ Terraform plan failed!"
          exit 1
        fi
    
    - name: Terraform Apply (on push to main/master or manual trigger)
      id: apply
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
      run: |
        echo "🚀 Applying Terraform changes..."
        echo "Branch: ${{ github.ref }}"
        echo "Event: ${{ github.event_name }}"
        terraform apply -auto-approve tfplan 2>&1 | tee terraform-apply-output.log
        if [ $? -eq 0 ]; then
          echo "✅ Terraform apply succeeded!"
        else
          echo "❌ Terraform apply failed!"
          exit 1
        fi
    
    - name: Terraform Output
      id: output
      if: steps.apply.outcome == 'success'
      run: |
        terraform output -no-color 2>&1 | tee terraform-output.log
    
    - name: Verify S3 Bucket Creation
      id: verify
      if: steps.apply.outcome == 'success'
      run: |
        echo "🔍 Verifying S3 bucket creation..."
        BUCKET_NAME=$(terraform output -raw bucket_name)
        echo "Bucket Name: $BUCKET_NAME"
        aws s3 ls s3://$BUCKET_NAME 2>&1 | tee s3-verify-output.log || echo "Bucket exists but may be empty"
        echo "✅ S3 bucket verified!"
    
    - name: Upload Terraform Format Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terraform-fmt-logs
        path: terraform/terraform-fmt-output.log
        retention-days: 30
        overwrite: true
    
    - name: Upload Terraform Init Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terraform-init-logs
        path: terraform/terraform-init-output.log
        retention-days: 30
        overwrite: true
    
    - name: Upload Terraform Validate Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terraform-validate-logs
        path: terraform/terraform-validate-output.log
        retention-days: 30
        overwrite: true
    
    - name: Upload Terraform Plan Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terraform-plan-logs
        path: terraform/terraform-plan-output.log
        retention-days: 30
        overwrite: true
    
    - name: Upload Terraform Apply Logs
      uses: actions/upload-artifact@v4
      if: always() && ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch')
      with:
        name: terraform-apply-logs
        path: terraform/terraform-apply-output.log
        retention-days: 30
        overwrite: true
    
    - name: Upload Terraform Output Logs
      uses: actions/upload-artifact@v4
      if: always() && steps.output.outcome == 'success'
      with:
        name: terraform-output-logs
        path: terraform/terraform-output.log
        retention-days: 30
        overwrite: true
    
    - name: Comment PR with Terraform Plan
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('terraform/terraform-plan-output.log', 'utf8');
          const output = `#### Terraform Plan 📖
          
          <details><summary>Show Plan</summary>
          
          \`\`\`
          ${plan}
          \`\`\`
          
          </details>
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });
