name: Integration Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-integration-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Backend - Install Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Backend - Run Integration Tests
      working-directory: ./backend
      run: |
        npm test -- backend/tests/integration/ --coverage --coverageReporters=html --coverageReporters=json-summary 2>&1 | tee integration-test-output.log
      continue-on-error: true

    - name: Upload Backend Integration Test Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-integration-test-logs
        path: backend/integration-test-output.log
        retention-days: 30
        overwrite: true

    - name: Upload Backend Integration Test Coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-integration-coverage-report
        path: backend/coverage/
        retention-days: 30
        overwrite: true
