name: CD Pipeline - EC2 Deployment

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_original_push_id != null || github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Check for EC2 Secrets
      id: check_secrets
      shell: bash
      run: |
        if [ -n "${{ secrets.EC2_HOST }}" ] && [ -n "${{ secrets.EC2_SSH_KEY }}" ]; then
          echo "secrets_present=true" >> $GITHUB_OUTPUT
        else
          echo "secrets_present=false" >> $GITHUB_OUTPUT
          echo "::warning title=Missing Secrets::EC2_HOST or EC2_SSH_KEY not found in GitHub Secrets. Skipping deployment."
        fi

    - name: Deploy to EC2 via SSH
      if: steps.check_secrets.outputs.secrets_present == 'true'
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 10. Idempotent Scripts
          mkdir -p ~/app/backend
          mkdir -p ~/app/frontend
          
          # Navigate and Pull latest changes
          cd ~/app
          git pull origin main || git clone https://github.com/HARSHAKARTHIKEYA1510/devops.git .
          
          # Backend deployment (Idempotent)
          cd ~/app/backend
          npm install --production
          
          # 9. Execute Commands: Restart service (e.g. using pm2)
          pm2 delete backend || true
          pm2 start server.js --name backend
          
          # Frontend deployment
          cd ~/app/frontend
          npm install --production
          npm run build
          
          # Restart frontend (e.g. using pm2)
          pm2 delete frontend || true
          pm2 start npm --name frontend -- start
          
          echo "✅ Deployment successful on EC2 at $(date)"

    - name: Deployment Note (If skipped)
      if: steps.check_secrets.outputs.secrets_present == 'false'
      run: |
        echo "The CD pipeline is correctly configured. To enable live deployment, add 'EC2_HOST', 'EC2_USERNAME', and 'EC2_SSH_KEY' to your GitHub Repository Secrets."

