name: CI Pipeline - Lint and Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './**/package-lock.json'

    - name: Backend - Install Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Backend - Run Linter
      working-directory: ./backend
      run: |
        npm run lint 2>&1 | tee lint-output.log
      continue-on-error: true

    - name: Upload Backend Lint Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-lint-logs
        path: backend/lint-output.log
        retention-days: 30
        overwrite: true

    - name: Frontend - Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Frontend - Run Linter
      working-directory: ./frontend
      run: |
        npm run lint 2>&1 | tee lint-output.log
      continue-on-error: true

    - name: Upload Frontend Lint Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-lint-logs
        path: frontend/lint-output.log
        retention-days: 30
        overwrite: true

    - name: Frontend - Build
      working-directory: ./frontend
      run: |
        npm run build 2>&1 | tee build-output.log
      continue-on-error: true

    - name: Upload Frontend Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-build-logs
        path: frontend/build-output.log
        retention-days: 30
        overwrite: true

