name: Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Backend - Install Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Backend - Run Unit Tests
      working-directory: ./backend
      run: |
        npm test -- backend/tests/unit/ --coverage --coverageReporters=html --coverageReporters=json-summary 2>&1 | tee unit-test-output.log
      continue-on-error: true

    - name: Upload Backend Unit Test Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-unit-test-logs
        path: backend/unit-test-output.log
        retention-days: 30
        overwrite: true

    - name: Upload Backend Unit Test Coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-unit-coverage-report
        path: backend/coverage/
        retention-days: 30
        overwrite: true

  frontend-unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Frontend - Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Frontend - Run Unit Tests
      working-directory: ./frontend
      run: |
        npm test -- frontend/tests/unit/ --coverage --coverageReporters=html --coverageReporters=json-summary 2>&1 | tee unit-test-output.log
      continue-on-error: true

    - name: Upload Frontend Unit Test Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-unit-test-logs
        path: frontend/unit-test-output.log
        retention-days: 30
        overwrite: true

    - name: Upload Frontend Unit Test Coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-unit-coverage-report
        path: frontend/coverage/
        retention-days: 30
        overwrite: true
